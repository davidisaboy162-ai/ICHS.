# ICHS Configuration

# Data Configuration
data:
  raw_path: "data/raw"
  processed_path: "data/processed"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  seed: 42

# Image Model Configuration
image_model:
  type: "ResNet50"
  input_shape: [224, 224, 3]
  num_classes: 10
  pretrained: true

# NLP Model Configuration
nlp_model:
  type: "BERT"
  max_length: 512
  num_classes: 10

# Training Configuration
training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  optimizer: "adam"

# Paths
model_paths:
  image_model: "models/cnn_model.h5"
  nlp_model: "models/nlp_model.pkl"
